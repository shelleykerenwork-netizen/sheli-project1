services:
  - type: web
    name: sheli-surveys-api
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        value: shelleykeren@gmail.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: sheli-surveys-db
          property: connectionString

  - type: web
    name: sheli-surveys-frontend
    env: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://sheli-surveys-api.onrender.com

databases:
  - name: sheli-surveys-db
    databaseName: surveys
    user: surveys_user
    region: frankfurt
    plan: free
